name: Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Optional existing tag to upload artifacts to
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: release-assets-${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

env:
  RELEASE_PROFILE: recommended
  RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag }}

jobs:
  build-release-assets:
    name: Build Python release assets
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Validate workflow inputs
        shell: bash
        run: |
          if [[ -n "${RELEASE_TAG}" && ! "${RELEASE_TAG}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+.*$ ]]; then
            echo "Release tag must look like v0.2.0rc1 or v0.2.0: ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG != '' && env.RELEASE_TAG || github.ref }}

      - name: Hydrate router assets
        shell: bash
        run: git lfs pull --include="src/opensquilla/squilla_router/models/**"

      - name: Verify router assets are hydrated
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path("src/opensquilla/squilla_router/models/v4.2_phase3_inference")
          required = [
              root / "PROVENANCE.md",
              root / "artifact_manifest.json",
              root / "bge_onnx" / "model.onnx",
              root / "features" / "tfidf.pkl",
              root / "lgbm_main.bin",
              root / "mlp" / "model.onnx",
              root / "router.runtime.yaml",
          ]
          for path in required:
              assert path.is_file(), f"missing router asset: {path}"
              prefix = path.read_bytes()[:80]
              assert not prefix.startswith(b"version https://git-lfs.github.com/spec/v1"), (
                  f"Git LFS pointer file is not hydrated: {path}"
              )
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Check tag version
        if: ${{ github.event_name == 'push' || github.event.inputs.tag != '' }}
        shell: bash
        run: |
          version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(pyproject["project"]["version"])
          PY
          )"
          tag="${RELEASE_TAG}"
          tag_version="${tag#v}"
          if [[ "${tag_version}" != "${version}" ]]; then
            echo "Tag ${tag} does not match project version ${version}" >&2
            exit 1
          fi

      - name: Test release asset contracts
        run: uv run --extra dev pytest tests/test_scripts/test_build_wheelhouse_zip.py

      - name: Build versioned wheel
        shell: bash
        run: |
          rm -rf dist build/wheelhouse-zip
          uv build --wheel --out-dir dist

      - name: Smoke versioned release artifacts
        shell: bash
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path
          from zipfile import ZipFile

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          wheels = sorted(
              path for path in Path("dist").glob("opensquilla-*.whl")
          )
          assert len(wheels) == 1, f"expected one versioned wheel, got {len(wheels)}"
          assert wheels[0].name == f"opensquilla-{version}-py3-none-any.whl"
          assert not list(Path("dist").glob("OpenSquilla-*portable*.zip")), (
              "0.5+ release assets must not include Windows portable zips"
          )

          with ZipFile(wheels[0]) as archive:
              for info in archive.infolist():
                  if not info.filename.endswith((".bin", ".onnx", ".pkl", ".joblib")):
                      continue
                  prefix = archive.read(info)[:80]
                  assert not prefix.startswith(b"version https://git-lfs.github.com/spec/v1"), (
                      f"Git LFS pointer leaked into wheel: {info.filename}"
                  )
          PY

      - name: Create release assets
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import tomllib
          from pathlib import Path

          dist = Path("dist")
          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = project["project"]["version"]
          wheels = sorted(
              path for path in dist.glob("opensquilla-*.whl")
          )
          assert len(wheels) == 1, f"expected one versioned wheel, got {len(wheels)}"
          assert wheels[0].name == f"opensquilla-{version}-py3-none-any.whl"
          assets = [wheels[0]]
          lines = [
              f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}"
              for path in assets
          ]
          (dist / "SHA256SUMS").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: opensquilla-release-assets-python-${{ env.RELEASE_PROFILE }}
          path: |
            dist/*.whl
            dist/SHA256SUMS

  build-tui-host-macos:
    name: Build signed macOS TUI host (${{ matrix.arch }})
    needs: build-release-assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            wheel_tag: macosx_11_0_arm64
          - arch: x64
            runner: macos-15-intel
            wheel_tag: macosx_11_0_x86_64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG != '' && env.RELEASE_TAG || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up pinned Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: src/opensquilla/cli/tui/opentui/package/.bun-version

      - name: Download matching core wheel
        uses: actions/download-artifact@v4
        with:
          name: opensquilla-release-assets-python-${{ env.RELEASE_PROFILE }}
          path: dist/core

      - name: Import Developer ID certificate
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${MAC_CSC_LINK}" || -z "${MAC_CSC_KEY_PASSWORD}" ]]; then
            echo "Developer ID credentials are required for macOS TUI host release artifacts." >&2
            exit 1
          fi
          certificate_path="${RUNNER_TEMP}/opensquilla-tui-host-signing.p12"
          keychain_path="${RUNNER_TEMP}/opensquilla-tui-host-signing.keychain-db"
          keychain_password="$(openssl rand -hex 32)"
          python - "${certificate_path}" <<'PY'
          import base64
          import os
          import shutil
          import sys
          import urllib.request
          from pathlib import Path

          value = os.environ["MAC_CSC_LINK"]
          destination = Path(sys.argv[1])
          if value.startswith(("https://", "http://")):
              with urllib.request.urlopen(value, timeout=60) as response:
                  destination.write_bytes(response.read())
          elif value.startswith("file://"):
              shutil.copyfile(value.removeprefix("file://"), destination)
          elif len(value) < 1024 and Path(value).is_file():
              shutil.copyfile(value, destination)
          else:
              encoded = value.split(",", 1)[1] if value.startswith("data:") else value
              destination.write_bytes(base64.b64decode(encoded, validate=True))
          PY
          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" \
            -k "${keychain_path}" \
            -P "${MAC_CSC_KEY_PASSWORD}" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${keychain_password}" \
            "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}"
          identity="$(
            security find-identity -v -p codesigning "${keychain_path}" \
              | sed -n 's/.*"\(Developer ID Application:[^"]*\)".*/\1/p' \
              | head -n 1
          )"
          if [[ -z "${identity}" ]]; then
            echo "No Developer ID Application identity was imported." >&2
            exit 1
          fi
          rm -f "${certificate_path}"
          echo "TUI_HOST_CODESIGN_IDENTITY=${identity}" >> "${GITHUB_ENV}"
          echo "TUI_HOST_KEYCHAIN_PATH=${keychain_path}" >> "${GITHUB_ENV}"

      - name: Check companion version
        shell: bash
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          core = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          companion = tomllib.loads(
              Path("packages/opensquilla-tui-host/pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]
          assert companion == core, f"core/companion version mismatch: {core} != {companion}"
          PY

      - name: Build signed companion wheel
        shell: bash
        run: |
          rm -rf dist/tui-host-${{ matrix.arch }}
          python scripts/build_tui_host_companion.py \
            --platform darwin \
            --arch "${{ matrix.arch }}" \
            --build-id "${GITHUB_SHA}" \
            --codesign-identity "${TUI_HOST_CODESIGN_IDENTITY}" \
            --require-codesign-identity \
            --output-dir "dist/tui-host-${{ matrix.arch }}"

      - name: Verify signed companion wheel
        shell: bash
        env:
          TUI_HOST_ARCH: ${{ matrix.arch }}
          TUI_HOST_WHEEL_TAG: ${{ matrix.wheel_tag }}
        run: |
          set -euo pipefail
          wheel="$(find "dist/tui-host-${TUI_HOST_ARCH}" -maxdepth 1 -type f -name '*.whl' -print -quit)"
          WHEEL="${wheel}" python - <<'PY'
          import hashlib
          import json
          import os
          import tomllib
          from pathlib import Path
          from zipfile import ZipFile

          wheel = Path(os.environ["WHEEL"])
          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          arch = os.environ["TUI_HOST_ARCH"]
          wheel_tag = os.environ["TUI_HOST_WHEEL_TAG"]
          expected = f"opensquilla_tui_host-{version}-py3-none-{wheel_tag}.whl"
          assert wheel.name == expected, f"unexpected companion wheel: {wheel.name}"
          with ZipFile(wheel) as archive:
              metadata_name = next(
                  name for name in archive.namelist() if name.endswith("/_host_metadata.json")
              )
              executable_name = next(
                  name for name in archive.namelist() if name.endswith("/bin/opensquilla-tui-host")
              )
              metadata = json.loads(archive.read(metadata_name))
              executable = archive.read(executable_name)
          assert metadata["product_version"] == version
          assert metadata["host_version"] == version
          assert metadata["platform"] == "darwin"
          assert metadata["arch"] == arch
          assert metadata["wheel_tag"] == f"py3-none-{wheel_tag}"
          assert metadata["build_id"] == os.environ["GITHUB_SHA"]
          assert metadata["sha256"] == hashlib.sha256(executable).hexdigest()
          PY
          rm -rf .tui-host-smoke
          uv venv --python 3.12 .tui-host-smoke
          uv pip install --python .tui-host-smoke/bin/python "${wheel}"
          host="$(.tui-host-smoke/bin/python - <<'PY'
          from opensquilla_tui_host import host_command
          print(host_command()[0])
          PY
          )"
          [[ "$(lipo -archs "${host}")" == "${TUI_HOST_ARCH/x64/x86_64}" ]]
          codesign --verify --strict --verbose=2 "${host}"
          codesign -dvv "${host}" 2>&1 | grep -F "Identifier=ai.opensquilla.tui-host"
          codesign -dvv "${host}" 2>&1 | grep -F "Authority=Developer ID Application:"
          codesign -dvv "${host}" 2>&1 | grep -E "flags=.*runtime"
          "${host}" --help | grep -F "OpenSquilla OpenTUI footer host"

      - name: Smoke clean core and companion install without Bun
        shell: bash
        run: |
          set -euo pipefail
          uv_bin="$(command -v uv)"
          core_wheel="$(find dist/core -maxdepth 1 -type f -name 'opensquilla-*-py3-none-any.whl' -print -quit)"
          host_wheel="$(find "dist/tui-host-${{ matrix.arch }}" -maxdepth 1 -type f -name '*.whl' -print -quit)"
          rm -rf .tui-host-release-smoke
          "${uv_bin}" venv --python 3.12 .tui-host-release-smoke
          "${uv_bin}" pip install \
            --python .tui-host-release-smoke/bin/python \
            "${core_wheel}" \
            "${host_wheel}"
          clean_path="${PWD}/.tui-host-release-smoke/bin:/usr/bin:/bin:/usr/sbin:/sbin"
          if PATH="${clean_path}" command -v bun >/dev/null 2>&1; then
            echo "Bun leaked into the packaged companion smoke PATH." >&2
            exit 1
          fi
          smoke_log="${RUNNER_TEMP}/opensquilla-tui-host-bridge-${{ matrix.arch }}.log"
          /usr/bin/script -q /dev/null \
            env \
            -u BUN_INSTALL \
            -u OPENSQUILLA_TUI_DEV_SOURCE_HOST \
            PATH="${clean_path}" \
            "${PWD}/.tui-host-release-smoke/bin/python" \
            "${GITHUB_WORKSPACE}/scripts/smoke_tui_host_companion.py" \
            | tee "${smoke_log}" >/dev/null
          SMOKE_LOG="${smoke_log}" python - <<'PY'
          import os
          from pathlib import Path

          payload = Path(os.environ["SMOKE_LOG"]).read_bytes()
          entered = payload.find(b"\x1b[?1049h")
          restored = payload.rfind(b"\x1b[?1049l")
          receipt = payload.find(b"TUI_HOST_BRIDGE_SMOKE_OK")
          assert -1 < entered < restored < receipt, (
              "packaged host did not enter and restore the alternate screen before receipt"
          )
          PY
          echo "Packaged TUI host bridge smoke passed without Bun."

      - name: Install tmux for packaged real-terminal gate
        shell: bash
        run: |
          set -euo pipefail
          brew install tmux
          tmux_bin="$(command -v tmux)"
          "${tmux_bin}" -V
          echo "TUI_HOST_TMUX_BIN=${tmux_bin}" >> "${GITHUB_ENV}"

      - name: Run packaged-host real-terminal release gate
        shell: bash
        run: |
          set -euo pipefail
          uv_bin="$(command -v uv)"
          core_wheel="$(find dist/core -maxdepth 1 -type f -name 'opensquilla-*-py3-none-any.whl' -print -quit)"
          host_wheel="$(find "dist/tui-host-${{ matrix.arch }}" -maxdepth 1 -type f -name '*.whl' -print -quit)"
          gate_env="${PWD}/.tui-host-real-terminal"
          artifact_root="${PWD}/dist/tui-host-real-terminal-${{ matrix.arch }}"
          rm -rf "${gate_env}" "${artifact_root}"
          mkdir -p "${artifact_root}/runs"
          "${uv_bin}" venv --python 3.12 "${gate_env}"
          "${uv_bin}" pip install \
            --python "${gate_env}/bin/python" \
            "${core_wheel}[dev]" \
            "${host_wheel}"
          ln -sf "${TUI_HOST_TMUX_BIN}" "${gate_env}/bin/tmux"
          clean_path="${gate_env}/bin:/usr/bin:/bin:/usr/sbin:/sbin"
          if PATH="${clean_path}" command -v bun >/dev/null 2>&1; then
            echo "Bun leaked into the packaged real-terminal gate PATH." >&2
            exit 1
          fi
          PATH="${clean_path}" \
          PROJECT_SRC="${PWD}/src" \
          env -u PYTHONPATH -u BUN_INSTALL -u OPENSQUILLA_TUI_DEV_SOURCE_HOST \
            "${gate_env}/bin/python" - <<'PY'
          import os
          from pathlib import Path

          import opensquilla
          from opensquilla_tui_host import host_metadata

          installed = Path(opensquilla.__file__).resolve()
          source = Path(os.environ["PROJECT_SRC"]).resolve()
          assert source not in installed.parents, (source, installed)
          assert host_metadata().product_version == opensquilla.__version__
          print({"installed_core": str(installed), "host": host_metadata().build_id})
          PY
          test_log="${artifact_root}/pytest.log"
          set +e
          PATH="${clean_path}" \
          OPENSQUILLA_TUI_PACKAGED_GATE=1 \
          env -u PYTHONPATH -u BUN_INSTALL -u OPENSQUILLA_TUI_DEV_SOURCE_HOST \
            "${gate_env}/bin/python" -m pytest \
              tests/integration/cli/tui_real_terminal/test_launch_input_loop.py \
              tests/integration/cli/tui_real_terminal/test_long_streaming.py \
              tests/integration/cli/tui_real_terminal/test_complex_ui_state.py \
              tests/integration/cli/tui_real_terminal/test_architecture_prompt.py \
              tests/integration/cli/tui_real_terminal/test_terminal_changes.py \
              tests/integration/cli/tui_real_terminal/test_completion_menu.py \
              tests/integration/cli/tui_real_terminal/test_mouse_scroll_stability.py \
              tests/integration/cli/tui_real_terminal/test_framebuffer_recovery.py \
              tests/integration/cli/tui_real_terminal/test_idle_resize_round_trip.py \
              tests/integration/cli/tui_real_terminal/test_exit_restoration.py \
              tests/integration/cli/tui_real_terminal/test_packaged_gateway_e2e.py \
              --tui-backend opentui \
              --tui-driver tmux \
              --tui-require-capabilities \
              --tui-artifact-root "${artifact_root}/runs" \
              --junitxml "${artifact_root}/junit.xml" \
              -q \
              2>&1 | tee "${test_log}"
          pytest_status="${PIPESTATUS[0]}"
          set -e
          if [[ "${pytest_status}" != "0" ]]; then
            echo "Packaged-host real-terminal release gate failed; evidence will be uploaded." >&2
            exit "${pytest_status}"
          fi

      - name: Upload packaged-host real-terminal evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: opensquilla-tui-real-terminal-macos-${{ matrix.arch }}
          path: dist/tui-host-real-terminal-${{ matrix.arch }}
          if-no-files-found: warn
          retention-days: 14

      - name: Notarize and assess companion host
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TUI_HOST_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_ID}" || -z "${APPLE_APP_SPECIFIC_PASSWORD}" || -z "${APPLE_TEAM_ID}" ]]; then
            echo "Apple notarization credentials are required for macOS TUI host release artifacts." >&2
            exit 1
          fi
          host="$(.tui-host-smoke/bin/python - <<'PY'
          from opensquilla_tui_host import host_command
          print(host_command()[0])
          PY
          )"
          notarization_archive="${RUNNER_TEMP}/opensquilla-tui-host-${TUI_HOST_ARCH}-notarization.zip"
          notarization_result="${RUNNER_TEMP}/opensquilla-tui-host-${TUI_HOST_ARCH}-notarization.json"
          ditto -c -k --keepParent "${host}" "${notarization_archive}"
          xcrun notarytool submit "${notarization_archive}" \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait \
            --output-format json > "${notarization_result}"
          RESULT="${notarization_result}" python - <<'PY'
          import json
          import os
          from pathlib import Path

          result = json.loads(Path(os.environ["RESULT"]).read_text(encoding="utf-8"))
          assert result.get("status") == "Accepted", result
          print({"id": result.get("id"), "status": result.get("status")})
          PY
          # A bare executable inside a wheel has no stapler-supported container.
          # Assess the notarized code object with quarantine set so Gatekeeper
          # must resolve Apple's online ticket for the exact signed bytes.
          xattr -w com.apple.quarantine "0081;$(printf '%x' "$(date +%s)");OpenSquillaRelease;" "${host}"
          accepted=0
          for _ in {1..12}; do
            if spctl --assess --type execute --verbose=4 "${host}"; then
              accepted=1
              break
            fi
            sleep 10
          done
          if [[ "${accepted}" != "1" ]]; then
            echo "Gatekeeper did not accept the notarized TUI host." >&2
            exit 1
          fi

      - name: Upload macOS TUI host artifact
        uses: actions/upload-artifact@v4
        with:
          name: opensquilla-tui-host-macos-${{ matrix.arch }}
          path: dist/tui-host-${{ matrix.arch }}/*.whl

      - name: Delete temporary signing keychain
        if: ${{ always() }}
        shell: bash
        run: |
          if [[ -n "${TUI_HOST_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "${TUI_HOST_KEYCHAIN_PATH}" || true
          fi

  build-tui-host-linux:
    name: Build Linux TUI host (${{ matrix.arch }})
    needs: build-release-assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
            container_image: quay.io/pypa/manylinux_2_28_x86_64@sha256:b04887b645dde99b9e955aeae3ff4da414992d0bd88259f046295b56361c5614
            native_machine: x86_64
            elf_machine: Advanced Micro Devices X86-64
            bun_target: bun-linux-x64-baseline
            wheel_tag: manylinux_2_28_x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            container_image: quay.io/pypa/manylinux_2_28_aarch64@sha256:d129a18d4aeecc9ce6db592474bdb127838339eed67cd7cd61617bb027b14c1e
            native_machine: aarch64
            elf_machine: AArch64
            bun_target: bun-linux-arm64
            wheel_tag: manylinux_2_28_aarch64
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.container_image }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG != '' && env.RELEASE_TAG || github.ref }}

      - name: Verify native Linux runner
        shell: bash
        env:
          TUI_HOST_NATIVE_MACHINE: ${{ matrix.native_machine }}
        run: |
          set -euo pipefail
          [[ "$(uname -s)" == "Linux" ]]
          [[ "$(uname -m)" == "${TUI_HOST_NATIVE_MACHINE}" ]]
          [[ "$(getconf GNU_LIBC_VERSION)" == "glibc 2.28" ]]

      - name: Configure manylinux toolchain
        shell: bash
        run: |
          set -euo pipefail
          dnf install --assumeyes binutils file findutils tmux util-linux
          python_bin="/opt/python/cp312-cp312/bin"
          "${python_bin}/python" --version
          echo "${python_bin}" >> "${GITHUB_PATH}"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up pinned Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: src/opensquilla/cli/tui/opentui/package/.bun-version

      - name: Download matching core wheel
        uses: actions/download-artifact@v4
        with:
          name: opensquilla-release-assets-python-${{ env.RELEASE_PROFILE }}
          path: dist/core

      - name: Check companion version
        shell: bash
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          core = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          companion = tomllib.loads(
              Path("packages/opensquilla-tui-host/pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]
          assert companion == core, f"core/companion version mismatch: {core} != {companion}"
          PY

      - name: Build native Linux companion wheel
        shell: bash
        run: |
          rm -rf dist/tui-host-linux-${{ matrix.arch }}
          python scripts/build_tui_host_companion.py \
            --platform linux \
            --arch "${{ matrix.arch }}" \
            --build-id "${GITHUB_SHA}" \
            --output-dir "dist/tui-host-linux-${{ matrix.arch }}"

      - name: Verify manylinux companion wheel and ELF contract
        shell: bash
        env:
          TUI_HOST_ARCH: ${{ matrix.arch }}
          TUI_HOST_BUN_TARGET: ${{ matrix.bun_target }}
          TUI_HOST_CONTAINER_IMAGE: ${{ matrix.container_image }}
          TUI_HOST_ELF_MACHINE: ${{ matrix.elf_machine }}
          TUI_HOST_WHEEL_TAG: ${{ matrix.wheel_tag }}
        run: |
          set -euo pipefail
          wheel="$(find "dist/tui-host-linux-${TUI_HOST_ARCH}" -maxdepth 1 -type f -name '*.whl' -print -quit)"
          WHEEL="${wheel}" python - <<'PY'
          import hashlib
          import json
          import os
          import tomllib
          from pathlib import Path
          from zipfile import ZipFile

          wheel = Path(os.environ["WHEEL"])
          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          arch = os.environ["TUI_HOST_ARCH"]
          wheel_tag = os.environ["TUI_HOST_WHEEL_TAG"]
          expected = f"opensquilla_tui_host-{version}-py3-none-{wheel_tag}.whl"
          assert wheel.name == expected, f"unexpected companion wheel: {wheel.name}"
          with ZipFile(wheel) as archive:
              metadata_name = next(
                  name for name in archive.namelist() if name.endswith("/_host_metadata.json")
              )
              executable_name = next(
                  name for name in archive.namelist() if name.endswith("/bin/opensquilla-tui-host")
              )
              metadata = json.loads(archive.read(metadata_name))
              executable = archive.read(executable_name)
          assert metadata["product_version"] == version
          assert metadata["host_version"] == version
          assert metadata["platform"] == "linux"
          assert metadata["arch"] == arch
          assert metadata["bun_target"] == os.environ["TUI_HOST_BUN_TARGET"]
          assert metadata["wheel_tag"] == f"py3-none-{wheel_tag}"
          assert metadata["build_id"] == os.environ["GITHUB_SHA"]
          assert metadata["sha256"] == hashlib.sha256(executable).hexdigest()
          PY

          rm -rf .tui-host-linux-verify
          uv venv --python 3.12 .tui-host-linux-verify
          uv pip install --python .tui-host-linux-verify/bin/python "${wheel}"
          host="$(.tui-host-linux-verify/bin/python - <<'PY'
          from opensquilla_tui_host import host_command
          print(host_command()[0])
          PY
          )"
          {
            echo "container=${TUI_HOST_CONTAINER_IMAGE}"
            echo "runner=${RUNNER_NAME}"
            echo "runner_arch=${RUNNER_ARCH}"
            uname -a
            getconf GNU_LIBC_VERSION
            bun --version
            python --version
            uv --version
          } | tee "dist/tui-host-linux-${TUI_HOST_ARCH}/provenance.txt"
          file "${host}" | tee "dist/tui-host-linux-${TUI_HOST_ARCH}/file.txt"
          readelf -h "${host}" | tee "dist/tui-host-linux-${TUI_HOST_ARCH}/elf-header.txt"
          readelf -d "${host}" | tee "dist/tui-host-linux-${TUI_HOST_ARCH}/dynamic.txt"
          readelf --version-info "${host}" | tee "dist/tui-host-linux-${TUI_HOST_ARCH}/versions.txt"
          ldd "${host}" | tee "dist/tui-host-linux-${TUI_HOST_ARCH}/ldd.txt"
          file "${host}" | grep -F "ELF 64-bit LSB"
          readelf -h "${host}" | grep -F "Machine:" | grep -F "${TUI_HOST_ELF_MACHINE}"
          if readelf -d "${host}" | grep -E '(RPATH|RUNPATH)'; then
            echo "Linux TUI host must not contain RPATH or RUNPATH entries." >&2
            exit 1
          fi
          if ldd "${host}" | grep -F 'not found'; then
            echo "Linux TUI host has unresolved dynamic dependencies." >&2
            exit 1
          fi
          HOST="${host}" python - <<'PY'
          import os
          import re
          import subprocess

          host = os.environ["HOST"]
          arch = os.environ["TUI_HOST_ARCH"]
          dynamic_info = subprocess.run(
              ["readelf", "-d", host],
              check=True,
              capture_output=True,
              text=True,
          ).stdout
          needed = set(re.findall(r"Shared library: \[([^]]+)\]", dynamic_info))
          loaders = {
              "x64": "ld-linux-x86-64.so.2",
              "arm64": "ld-linux-aarch64.so.1",
          }
          allowed = {
              "libc.so.6",
              "libpthread.so.0",
              "libdl.so.2",
              "libm.so.6",
              loaders[arch],
          }
          assert "libc.so.6" in needed, needed
          assert needed <= allowed, f"unexpected dynamic dependencies: {sorted(needed - allowed)}"
          version_info = subprocess.run(
              ["readelf", "--version-info", host],
              check=True,
              capture_output=True,
              text=True,
          ).stdout
          required = {
              tuple(map(int, match))
              for match in re.findall(r"GLIBC_([0-9]+)[.]([0-9]+)", version_info)
          }
          assert required, "ELF does not declare a readable GLIBC floor"
          maximum = max(required)
          assert maximum <= (2, 28), (
              f"manylinux_2_28 wheel requires GLIBC_{maximum[0]}.{maximum[1]}"
          )
          print({"maximum_required_glibc": f"{maximum[0]}.{maximum[1]}"})
          PY
          "${host}" --help | grep -F "OpenSquilla OpenTUI footer host"

      - name: Smoke clean core and companion install without Bun
        shell: bash
        run: |
          set -euo pipefail
          uv_bin="$(command -v uv)"
          core_wheel="$(find dist/core -maxdepth 1 -type f -name 'opensquilla-*-py3-none-any.whl' -print -quit)"
          host_wheel="$(find "dist/tui-host-linux-${{ matrix.arch }}" -maxdepth 1 -type f -name '*.whl' -print -quit)"
          rm -rf .tui-host-release-smoke
          "${uv_bin}" venv --python 3.12 .tui-host-release-smoke
          "${uv_bin}" pip install \
            --python .tui-host-release-smoke/bin/python \
            "${core_wheel}" \
            "${host_wheel}"
          clean_path="${PWD}/.tui-host-release-smoke/bin:/usr/bin:/bin:/usr/sbin:/sbin"
          if PATH="${clean_path}" command -v bun >/dev/null 2>&1; then
            echo "Bun leaked into the packaged companion smoke PATH." >&2
            exit 1
          fi
          smoke_log="${RUNNER_TEMP}/opensquilla-tui-host-bridge-linux-${{ matrix.arch }}.log"
          command=(
            env
            -u PYTHONPATH
            -u BUN_INSTALL
            -u OPENSQUILLA_TUI_DEV_SOURCE_HOST
            PATH="${clean_path}"
            "${PWD}/.tui-host-release-smoke/bin/python"
            "${GITHUB_WORKSPACE}/scripts/smoke_tui_host_companion.py"
          )
          printf -v smoke_command '%q ' "${command[@]}"
          /usr/bin/script --quiet --return --command "${smoke_command}" "${smoke_log}" >/dev/null
          SMOKE_LOG="${smoke_log}" python - <<'PY'
          import os
          from pathlib import Path

          payload = Path(os.environ["SMOKE_LOG"]).read_bytes()
          entered = payload.find(b"\x1b[?1049h")
          restored = payload.rfind(b"\x1b[?1049l")
          receipt = payload.find(b"TUI_HOST_BRIDGE_SMOKE_OK")
          assert -1 < entered < restored < receipt, (
              "packaged host did not enter and restore the alternate screen before receipt"
          )
          PY
          echo "Packaged Linux TUI host bridge smoke passed without Bun."

      - name: Verify tmux for packaged real-terminal gate
        shell: bash
        run: |
          set -euo pipefail
          tmux_bin="$(command -v tmux)"
          "${tmux_bin}" -V
          echo "TUI_HOST_TMUX_BIN=${tmux_bin}" >> "${GITHUB_ENV}"

      - name: Run packaged-host real-terminal release gate
        shell: bash
        run: |
          set -euo pipefail
          uv_bin="$(command -v uv)"
          core_wheel="$(find dist/core -maxdepth 1 -type f -name 'opensquilla-*-py3-none-any.whl' -print -quit)"
          host_wheel="$(find "dist/tui-host-linux-${{ matrix.arch }}" -maxdepth 1 -type f -name '*.whl' -print -quit)"
          gate_env="${PWD}/.tui-host-real-terminal"
          artifact_root="${PWD}/dist/tui-host-real-terminal-linux-${{ matrix.arch }}"
          rm -rf "${gate_env}" "${artifact_root}"
          mkdir -p "${artifact_root}/runs"
          "${uv_bin}" venv --python 3.12 "${gate_env}"
          "${uv_bin}" pip install \
            --python "${gate_env}/bin/python" \
            "${core_wheel}[dev]" \
            "${host_wheel}"
          ln -sf "${TUI_HOST_TMUX_BIN}" "${gate_env}/bin/tmux"
          clean_path="${gate_env}/bin:/usr/bin:/bin:/usr/sbin:/sbin"
          if PATH="${clean_path}" command -v bun >/dev/null 2>&1; then
            echo "Bun leaked into the packaged real-terminal gate PATH." >&2
            exit 1
          fi
          PATH="${clean_path}" \
          PROJECT_SRC="${PWD}/src" \
          env -u PYTHONPATH -u BUN_INSTALL -u OPENSQUILLA_TUI_DEV_SOURCE_HOST \
            "${gate_env}/bin/python" - <<'PY'
          import os
          from pathlib import Path

          import opensquilla
          from opensquilla_tui_host import host_metadata

          installed = Path(opensquilla.__file__).resolve()
          source = Path(os.environ["PROJECT_SRC"]).resolve()
          assert source not in installed.parents, (source, installed)
          assert host_metadata().platform == "linux"
          assert host_metadata().product_version == opensquilla.__version__
          print({"installed_core": str(installed), "host": host_metadata().build_id})
          PY
          test_log="${artifact_root}/pytest.log"
          set +e
          PATH="${clean_path}" \
          OPENSQUILLA_TUI_PACKAGED_GATE=1 \
          env -u PYTHONPATH -u BUN_INSTALL -u OPENSQUILLA_TUI_DEV_SOURCE_HOST \
            "${gate_env}/bin/python" -m pytest \
              tests/integration/cli/tui_real_terminal/test_launch_input_loop.py \
              tests/integration/cli/tui_real_terminal/test_long_streaming.py \
              tests/integration/cli/tui_real_terminal/test_complex_ui_state.py \
              tests/integration/cli/tui_real_terminal/test_architecture_prompt.py \
              tests/integration/cli/tui_real_terminal/test_terminal_changes.py \
              tests/integration/cli/tui_real_terminal/test_completion_menu.py \
              tests/integration/cli/tui_real_terminal/test_mouse_scroll_stability.py \
              tests/integration/cli/tui_real_terminal/test_framebuffer_recovery.py \
              tests/integration/cli/tui_real_terminal/test_idle_resize_round_trip.py \
              tests/integration/cli/tui_real_terminal/test_exit_restoration.py \
              tests/integration/cli/tui_real_terminal/test_packaged_gateway_e2e.py \
              --tui-backend opentui \
              --tui-driver tmux \
              --tui-require-capabilities \
              --tui-artifact-root "${artifact_root}/runs" \
              --junitxml "${artifact_root}/junit.xml" \
              -q \
              2>&1 | tee "${test_log}"
          pytest_status="${PIPESTATUS[0]}"
          set -e
          if [[ "${pytest_status}" != "0" ]]; then
            echo "Packaged Linux real-terminal release gate failed; evidence will be uploaded." >&2
            exit "${pytest_status}"
          fi

      - name: Upload packaged-host real-terminal evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: opensquilla-tui-real-terminal-linux-${{ matrix.arch }}
          path: |
            dist/tui-host-real-terminal-linux-${{ matrix.arch }}
            dist/tui-host-linux-${{ matrix.arch }}/*.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Linux TUI host artifact
        uses: actions/upload-artifact@v4
        with:
          name: opensquilla-tui-host-linux-${{ matrix.arch }}
          path: dist/tui-host-linux-${{ matrix.arch }}/*.whl

  build-desktop-macos:
    name: Build macOS Electron installer
    runs-on: macos-latest
    timeout-minutes: 150
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG != '' && env.RELEASE_TAG || github.ref }}

      - name: Hydrate router assets
        run: git lfs pull --include="src/opensquilla/squilla_router/models/**"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: |
            opensquilla-webui/package-lock.json
            desktop/electron/package-lock.json

      - name: Install Web UI dependencies
        working-directory: opensquilla-webui
        run: npm ci

      - name: Install Electron dependencies
        working-directory: desktop/electron
        run: npm ci

      - name: Build signed macOS installer
        working-directory: desktop/electron
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npm run build:web
          npm run build:gateway
          npm run build
          npx electron-builder --mac --publish never

      - name: Verify Electron package
        working-directory: desktop/electron
        run: npm run verify:package

      - name: Smoke packaged gateway
        working-directory: desktop/electron
        env:
          OPENSQUILLA_REQUIRE_PACKAGED_GATEWAY_SMOKE: "1"
          OPENSQUILLA_GATEWAY_SMOKE_TIMEOUT_MS: "240000"
        run: npm run verify:gateway-smoke

      - name: Verify RC3-to-candidate macOS upgrade and uninstall preserve profile data
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          candidates=(dist/desktop-electron/OpenSquilla-*-mac-arm64.dmg)
          if [[ "${#candidates[@]}" -ne 1 || ! -f "${candidates[0]}" ]]; then
            echo "Expected exactly one candidate macOS DMG" >&2
            exit 1
          fi
          .github/scripts/verify-release-macos-upgrade.sh \
            "${candidates[0]}" built-candidate

      - name: List macOS artifacts
        run: find dist/desktop-electron -maxdepth 2 -type f -print

      - name: Upload macOS Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opensquilla-electron-macos
          path: |
            dist/desktop-electron/*.dmg
            dist/desktop-electron/*.zip
            dist/desktop-electron/*.blockmap
            dist/desktop-electron/latest-mac.yml

  build-desktop-windows:
    name: Build unsigned Windows Electron installer
    runs-on: windows-latest
    timeout-minutes: 150
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG != '' && env.RELEASE_TAG || github.ref }}

      - name: Hydrate router assets
        shell: bash
        run: git lfs pull --include="src/opensquilla/squilla_router/models/**"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: |
            opensquilla-webui/package-lock.json
            desktop/electron/package-lock.json

      - name: Install Web UI dependencies
        working-directory: opensquilla-webui
        run: npm ci

      - name: Install Electron dependencies
        working-directory: desktop/electron
        run: npm ci

      - name: Build unsigned Windows installer
        working-directory: desktop/electron
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          set -euo pipefail
          npm run build:web
          npm run build:gateway
          npm run build
          npx electron-builder --win --publish never

      - name: Verify Electron package
        working-directory: desktop/electron
        run: npm run verify:package

      - name: Smoke packaged gateway
        working-directory: desktop/electron
        env:
          OPENSQUILLA_REQUIRE_PACKAGED_GATEWAY_SMOKE: "1"
        run: npm run verify:gateway-smoke

      - name: Verify RC3-to-candidate Windows upgrade and uninstall preserve profile data
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $candidates = @(Get-ChildItem 'dist/desktop-electron/OpenSquilla-*-win-x64.exe' -File)
          if ($candidates.Count -ne 1) {
            throw "Expected exactly one candidate Windows installer; got $($candidates.Count)."
          }
          .github/scripts/verify-release-windows-upgrade.ps1 `
            -CandidateInstaller $candidates[0].FullName `
            -Label built-candidate `
            -VerifyLongRunningUpdateBanner

      - name: List Windows artifacts
        shell: bash
        run: find dist/desktop-electron -maxdepth 2 -type f -print

      - name: Upload Windows Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opensquilla-electron-windows
          path: |
            dist/desktop-electron/*.exe
            dist/desktop-electron/*.blockmap
            dist/desktop-electron/latest.yml

  publish-release:
    name: Publish release assets
    needs:
      - build-release-assets
      - build-tui-host-macos
      - build-tui-host-linux
      - build-desktop-macos
      - build-desktop-windows
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout release notes
        if: ${{ github.event_name == 'push' || github.event.inputs.tag != '' }}
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: opensquilla-release-assets-python-${{ env.RELEASE_PROFILE }}
          path: dist
          merge-multiple: true

      - name: Download macOS TUI host assets
        uses: actions/download-artifact@v4
        with:
          pattern: opensquilla-tui-host-macos-*
          path: dist
          merge-multiple: true

      - name: Download Linux TUI host assets
        uses: actions/download-artifact@v4
        with:
          pattern: opensquilla-tui-host-linux-*
          path: dist
          merge-multiple: true

      - name: Download macOS Electron assets
        uses: actions/download-artifact@v4
        with:
          name: opensquilla-electron-macos
          path: dist

      - name: Download Windows Electron assets
        uses: actions/download-artifact@v4
        with:
          name: opensquilla-electron-windows
          path: dist

      - name: Regenerate release checksums
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import os
          import re
          from pathlib import Path

          def desktop_asset_version(version: str) -> str:
              return re.sub(r"(?<=\d)(a|b|rc)(\d+)$", r"-\1\2", version)

          dist = Path("dist")
          tag = os.environ["RELEASE_TAG"]
          if tag:
              version = tag.removeprefix("v")
          else:
              wheels = sorted(dist.glob("opensquilla-*-py3-none-any.whl"))
              assert len(wheels) == 1, f"expected one wheel when RELEASE_TAG is empty, got {len(wheels)}"
              version = wheels[0].name.removeprefix("opensquilla-").removesuffix("-py3-none-any.whl")
          desktop_version = desktop_asset_version(version)
          asset_names = [
              f"OpenSquilla-{desktop_version}-mac-arm64.dmg",
              f"OpenSquilla-{desktop_version}-mac-arm64.zip",
              f"OpenSquilla-{desktop_version}-mac-arm64.dmg.blockmap",
              f"OpenSquilla-{desktop_version}-mac-arm64.zip.blockmap",
              "latest-mac.yml",
              f"OpenSquilla-{desktop_version}-win-x64.exe",
              f"OpenSquilla-{desktop_version}-win-x64.exe.blockmap",
              "latest.yml",
              f"opensquilla-{version}-py3-none-any.whl",
              f"opensquilla_tui_host-{version}-py3-none-macosx_11_0_arm64.whl",
              f"opensquilla_tui_host-{version}-py3-none-macosx_11_0_x86_64.whl",
              f"opensquilla_tui_host-{version}-py3-none-manylinux_2_28_aarch64.whl",
              f"opensquilla_tui_host-{version}-py3-none-manylinux_2_28_x86_64.whl",
          ]
          lines = []
          for name in asset_names:
              path = dist / name
              assert path.is_file(), f"missing release asset for checksum: {name}"
              lines.append(f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {name}")
          (dist / "SHA256SUMS").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Verify release asset set
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import os
          import re
          from pathlib import Path

          def desktop_asset_version(version: str) -> str:
              return re.sub(r"(?<=\d)(a|b|rc)(\d+)$", r"-\1\2", version)

          dist = Path("dist")
          tag = os.environ["RELEASE_TAG"]
          if tag:
              version = tag.removeprefix("v")
          else:
              wheels = sorted(dist.glob("opensquilla-*-py3-none-any.whl"))
              assert len(wheels) == 1, f"expected one wheel when RELEASE_TAG is empty, got {len(wheels)}"
              version = wheels[0].name.removeprefix("opensquilla-").removesuffix("-py3-none-any.whl")
          desktop_version = desktop_asset_version(version)
          sha256s = dist / "SHA256SUMS"
          asset_names = [
              f"OpenSquilla-{desktop_version}-mac-arm64.dmg",
              f"OpenSquilla-{desktop_version}-mac-arm64.zip",
              f"OpenSquilla-{desktop_version}-mac-arm64.dmg.blockmap",
              f"OpenSquilla-{desktop_version}-mac-arm64.zip.blockmap",
              "latest-mac.yml",
              f"OpenSquilla-{desktop_version}-win-x64.exe",
              f"OpenSquilla-{desktop_version}-win-x64.exe.blockmap",
              "latest.yml",
              f"opensquilla-{version}-py3-none-any.whl",
              f"opensquilla_tui_host-{version}-py3-none-macosx_11_0_arm64.whl",
              f"opensquilla_tui_host-{version}-py3-none-macosx_11_0_x86_64.whl",
              f"opensquilla_tui_host-{version}-py3-none-manylinux_2_28_aarch64.whl",
              f"opensquilla_tui_host-{version}-py3-none-manylinux_2_28_x86_64.whl",
          ]
          assets = [dist / name for name in asset_names]
          assert sha256s.is_file(), "missing SHA256SUMS"
          for path in assets:
              assert path.is_file(), f"missing release asset: {path.name}"
          expected = [
              f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}"
              for path in assets
          ]
          assert sha256s.read_text(encoding="utf-8").splitlines() == expected
          PY

      - name: Upload aggregate workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: opensquilla-release-assets-${{ env.RELEASE_PROFILE }}
          path: dist/*

      - name: Upload to GitHub Release
        if: ${{ github.event_name == 'push' || github.event.inputs.tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ env.RELEASE_TAG }}
        shell: bash
        run: |
          set -euo pipefail
          IS_PRERELEASE="$(python - <<'PY'
          import os
          import re

          tag = os.environ["TAG"]
          preview = re.search(
              r"(?:[-.]?(?:a|alpha|b|beta|rc|pre|preview))[0-9]+$",
              tag,
              flags=re.IGNORECASE,
          )
          print("true" if preview else "false")
          PY
          )"
          TITLE="OpenSquilla ${TAG#v}"
          NOTES_FILE="docs/releases/${TAG#v}.md"
          create_args=("${TAG}" --draft --verify-tag)
          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            TITLE="$(python - <<'PY'
          import os
          import re

          version = os.environ["TAG"].removeprefix("v")
          match = re.fullmatch(r"([0-9]+[.][0-9]+[.][0-9]+)(?:a|b|rc)([0-9]+)", version)
          if match:
              print(f"OpenSquilla {match.group(1)} Preview {match.group(2)}")
          else:
              print(f"OpenSquilla {version} Preview")
          PY
          )"
            create_args+=(--prerelease)
          fi
          create_args+=(--title "${TITLE}")
          if [[ -f "${NOTES_FILE}" ]]; then
            create_args+=(--notes-file "${NOTES_FILE}")
          fi

          assert_release_is_safe_draft() {
            local release_state
            release_state="$(gh release view "${TAG}" --json isDraft,isPrerelease)"
            RELEASE_STATE="${release_state}" EXPECTED_PRERELEASE="${IS_PRERELEASE}" python - <<'PY'
          import json
          import os

          state = json.loads(os.environ["RELEASE_STATE"])
          expected_prerelease = os.environ["EXPECTED_PRERELEASE"] == "true"
          if state.get("isDraft") is not True:
              raise SystemExit("Refusing to mutate an existing non-Draft GitHub Release")
          if state.get("isPrerelease") is not expected_prerelease:
              raise SystemExit(
                  "Refusing to mutate a GitHub Release with an unexpected prerelease state"
              )
          PY
          }

          if gh release view "${TAG}" --json isDraft,isPrerelease >/dev/null 2>&1; then
            assert_release_is_safe_draft
          else
            gh release create "${create_args[@]}"
            assert_release_is_safe_draft
          fi
          if [[ -f "${NOTES_FILE}" ]]; then
            gh release edit "${TAG}" --title "${TITLE}" --notes-file "${NOTES_FILE}"
          fi
          assert_release_is_safe_draft
          python - <<'PY'
          import json
          import os
          import subprocess

          tag = os.environ["TAG"]
          raw = subprocess.check_output(
              ["gh", "release", "view", tag, "--json", "assets"],
              text=True,
          )
          data = json.loads(raw)
          for asset in data.get("assets", []):
              name = asset["name"]
              managed = (
                  name == "SHA256SUMS"
                  or name == "latest-mac.yml"
                  or name == "latest.yml"
                  or name.startswith("OpenSquilla-")
                  or name.startswith("opensquilla-")
                  or name.startswith("opensquilla_tui_host-")
                  or name.endswith(".sha256")
              )
              if managed:
                  subprocess.run(
                      ["gh", "release", "delete-asset", tag, name, "--yes"],
                      check=True,
                  )
          PY
          assert_release_is_safe_draft
          gh release upload "${TAG}" dist/* --clobber
          assert_release_is_safe_draft

      - name: Verify GitHub Release assets
        if: ${{ github.event_name == 'push' || github.event.inputs.tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ env.RELEASE_TAG }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys

          def desktop_asset_version(version: str) -> str:
              return re.sub(r"(?<=\d)(a|b|rc)(\d+)$", r"-\1\2", version)

          tag = os.environ["TAG"]
          version = tag.removeprefix("v")
          desktop_version = desktop_asset_version(version)
          expected = {
              f"OpenSquilla-{desktop_version}-mac-arm64.dmg",
              f"OpenSquilla-{desktop_version}-mac-arm64.zip",
              f"OpenSquilla-{desktop_version}-mac-arm64.dmg.blockmap",
              f"OpenSquilla-{desktop_version}-mac-arm64.zip.blockmap",
              "latest-mac.yml",
              f"OpenSquilla-{desktop_version}-win-x64.exe",
              f"OpenSquilla-{desktop_version}-win-x64.exe.blockmap",
              "latest.yml",
              f"opensquilla-{version}-py3-none-any.whl",
              f"opensquilla_tui_host-{version}-py3-none-macosx_11_0_arm64.whl",
              f"opensquilla_tui_host-{version}-py3-none-macosx_11_0_x86_64.whl",
              f"opensquilla_tui_host-{version}-py3-none-manylinux_2_28_aarch64.whl",
              f"opensquilla_tui_host-{version}-py3-none-manylinux_2_28_x86_64.whl",
              "SHA256SUMS",
          }
          raw = subprocess.check_output(
              [
                  "gh",
                  "release",
                  "view",
                  tag,
                  "--json",
                  "assets,isDraft,isPrerelease",
              ],
              text=True,
          )
          data = json.loads(raw)
          preview = re.search(
              r"(?:[-.]?(?:a|alpha|b|beta|rc|pre|preview))[0-9]+$",
              tag,
              flags=re.IGNORECASE,
          )
          if data.get("isDraft") is not True:
              print("Release asset verification requires a Draft release", file=sys.stderr)
              raise SystemExit(1)
          if data.get("isPrerelease") is not bool(preview):
              print("Release prerelease state does not match the tag", file=sys.stderr)
              raise SystemExit(1)
          names = {asset["name"] for asset in data.get("assets", [])}
          missing = sorted(expected - names)
          unexpected = sorted(names - expected)
          if missing or unexpected:
              print(
                  "Unexpected GitHub Release assets:",
                  {
                      "missing": missing,
                      "unexpected": unexpected,
                      "names": sorted(names),
                  },
                  file=sys.stderr,
              )
              raise SystemExit(1)
          PY

  audit-downloaded-macos-release:
    name: Audit downloaded macOS draft assets
    if: ${{ github.event_name == 'push' || github.event.inputs.tag != '' }}
    needs: publish-release
    runs-on: macos-latest
    timeout-minutes: 75
    permissions:
      contents: write
    steps:
      - name: Checkout release verification helpers
        uses: actions/checkout@v4
        with:
          lfs: false
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js for app.asar verification
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Download actual draft release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ env.RELEASE_TAG }}
        shell: bash
        run: |
          set -euo pipefail
          state="$(gh release view "${TAG}" --json isDraft)"
          RELEASE_STATE="${state}" python - <<'PY'
          import json
          import os

          assert json.loads(os.environ["RELEASE_STATE"])["isDraft"] is True, (
              "downloaded release audit may only inspect a Draft release"
          )
          PY
          mkdir -p release-audit
          gh release download "${TAG}" --dir release-audit

      - name: Verify checksums, signing, notarization, and packaged version
        env:
          TAG: ${{ env.RELEASE_TAG }}
        shell: bash
        run: |
          set -euo pipefail
          cd release-audit
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          lines = Path("SHA256SUMS").read_text(encoding="utf-8").splitlines()
          assert lines, "SHA256SUMS is empty"
          for line in lines:
              digest, name = line.split("  ", 1)
              path = Path(name)
              assert path.is_file(), f"downloaded release asset is missing: {name}"
              assert sha256(path.read_bytes()).hexdigest() == digest, (
                  f"checksum mismatch for downloaded asset: {name}"
              )
          PY

          dmg_candidates=(OpenSquilla-*-mac-arm64.dmg)
          zip_candidates=(OpenSquilla-*-mac-arm64.zip)
          if [[ "${#dmg_candidates[@]}" -ne 1 || ! -f "${dmg_candidates[0]}" ]]; then
            echo "Expected exactly one downloaded macOS DMG" >&2
            exit 1
          fi
          if [[ "${#zip_candidates[@]}" -ne 1 || ! -f "${zip_candidates[0]}" ]]; then
            echo "Expected exactly one downloaded macOS ZIP" >&2
            exit 1
          fi

          expected_version="$(python - "${TAG#v}" <<'PY'
          import re
          import sys

          print(re.sub(r"(?<=\d)(a|b|rc)(\d+)$", r"-\1\2", sys.argv[1]))
          PY
          )"

          validate_app() {
            local app_path plist actual_version asar_dir
            app_path="$(cd "$(dirname "$1")" && pwd)/$(basename "$1")"
            plist="${app_path}/Contents/Info.plist"
            actual_version="$(/usr/libexec/PlistBuddy \
              -c 'Print :CFBundleShortVersionString' "${plist}")"
            test "${actual_version}" = "${expected_version}"
            asar_dir="$(mktemp -d)"
            (
              cd "${asar_dir}"
              npx --yes @electron/asar@3.4.1 extract-file \
                "${app_path}/Contents/Resources/app.asar" package.json
              python - "${expected_version}" <<'PY'
          import json
          import sys
          from pathlib import Path

          packaged = json.loads(Path("package.json").read_text(encoding="utf-8"))
          assert packaged["version"] == sys.argv[1], (
              f"app.asar version {packaged['version']!r} != expected {sys.argv[1]!r}"
          )
          PY
            )
            python - "${asar_dir}" <<'PY'
          import shutil
          import sys

          shutil.rmtree(sys.argv[1])
          PY
            codesign --verify --deep --strict --verbose=2 "${app_path}"
            spctl -a -vv -t exec "${app_path}"
            xcrun stapler validate "${app_path}"
          }

          extracted="$(mktemp -d)"
          ditto -x -k "${zip_candidates[0]}" "${extracted}"
          validate_app "${extracted}/OpenSquilla.app"

          mounted="$(mktemp -d)"
          cleanup_mount() {
            hdiutil detach "${mounted}" -quiet >/dev/null 2>&1 || true
          }
          trap cleanup_mount EXIT
          hdiutil attach -nobrowse -readonly -mountpoint "${mounted}" "${dmg_candidates[0]}"
          validate_app "${mounted}/OpenSquilla.app"
          hdiutil detach "${mounted}" -quiet

      - name: Verify downloaded RC3-to-candidate macOS upgrade and uninstall
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          candidates=(release-audit/OpenSquilla-*-mac-arm64.dmg)
          if [[ "${#candidates[@]}" -ne 1 || ! -f "${candidates[0]}" ]]; then
            echo "Expected exactly one downloaded candidate macOS DMG" >&2
            exit 1
          fi
          .github/scripts/verify-release-macos-upgrade.sh \
            "${candidates[0]}" downloaded-asset

  audit-downloaded-windows-release:
    name: Audit downloaded Windows draft asset
    if: ${{ github.event_name == 'push' || github.event.inputs.tag != '' }}
    needs: publish-release
    runs-on: windows-latest
    timeout-minutes: 75
    permissions:
      contents: write
    steps:
      - name: Checkout release verification helpers
        uses: actions/checkout@v4
        with:
          lfs: false
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download actual draft release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          $ErrorActionPreference = 'Stop'
          $state = gh release view $env:TAG --json isDraft | ConvertFrom-Json
          if (-not $state.isDraft) {
            throw 'Downloaded release audit may only inspect a Draft release.'
          }
          New-Item -ItemType Directory -Force -Path release-audit | Out-Null
          gh release download $env:TAG --dir release-audit
          if ($LASTEXITCODE -ne 0) { throw 'Failed to download Draft release assets.' }

      - name: Verify downloaded checksums
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $checksumLines = Get-Content -LiteralPath 'release-audit/SHA256SUMS'
          if ($checksumLines.Count -eq 0) { throw 'SHA256SUMS is empty.' }
          foreach ($line in $checksumLines) {
            $parts = $line -split '  ', 2
            if ($parts.Count -ne 2) { throw "Malformed checksum line: $line" }
            $path = Join-Path 'release-audit' $parts[1]
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Downloaded release asset is missing: $($parts[1])"
            }
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $path).Hash.ToLowerInvariant()
            if ($actual -ne $parts[0].ToLowerInvariant()) {
              throw "Checksum mismatch for downloaded asset: $($parts[1])"
            }
          }

      - name: Verify downloaded RC3-to-candidate Windows upgrade and uninstall
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $candidates = @(Get-ChildItem 'release-audit/OpenSquilla-*-win-x64.exe' -File)
          if ($candidates.Count -ne 1) {
            throw "Expected exactly one downloaded Windows installer; got $($candidates.Count)."
          }
          .github/scripts/verify-release-windows-upgrade.ps1 `
            -CandidateInstaller $candidates[0].FullName `
            -Label downloaded-asset
